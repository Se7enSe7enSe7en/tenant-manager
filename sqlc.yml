version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/**/*.query.sql"
    schema: "./internal/database/migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/database/generated"
        sql_package: "pgx/v5"
        emit_interface: true # this is for enabling Querier interface
        overrides:
          # pgtype.UUID to google/uuid
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
