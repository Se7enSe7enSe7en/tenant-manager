# https://taskfile.dev

# Setup guide:
# STEP 1: install task, `go install github.com/go-task/task/v3/cmd/task@latest`
# STEP 2: use task to run the "setup" command `task setup`

# Setup tailwind without npm: https://tailwindcss.com/blog/standalone-cli

version: "3"

interval: 500ms # note: this is the watch interval, taskfile will watch for changes every 500ms

vars:
  PORT: 8080
  PROXY_PORT: 7331
  TAILWIND_INPUT_CSS_PATH: ./internal/web/static/assets/css/input.css
  TAILWIND_OUTPUT_CSS_PATH: ./internal/web/static/assets/css/output.css
  SERVER_PATH: ./cmd/server

tasks:
  setup-tailwind-cli-mac:
    platforms: [darwin]
    cmds:
      - curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64
      - chmod +x tailwindcss-macos-arm64
      - mv tailwindcss-macos-arm64 tailwindcss

  setup-tailwind-cli-linux:
    platforms: [linux]
    cmds:
      - curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.18/tailwindcss-linux-x64
      - chmod +x tailwindcss-linux-x64
      - mv tailwindcss-linux-x64 tailwindcss

  setup-tailwind:
    deps:
      - task: setup-tailwind-cli-mac
      - task: setup-tailwind-cli-linux

  setup:
    cmds:
      # TODO: improve setup in the future where it just checks if you already have the tool no need to install
      - task: setup-tailwind
      - go install github.com/a-h/templ/cmd/templ@latest # setup templ
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest # setup sqlc
      - go install github.com/pressly/goose/v3/cmd/goose@latest # setup goose
      - go install github.com/templui/templui/cmd/templui@latest # setup templui
      - go mod tidy

  kill:
    method: none
    desc: Kills process on port 8080
    cmds:
      # kills process on port 8080 on linux
      - cmd: fuser -k {{.PORT}}/tcp > /dev/null 2>&1 || true
        platforms: [linux]

      # kills process on port 8080 on macOS (darwin)
      - cmd: (lsof -nti :{{.PORT}} | xargs kill -9) || true
        platforms: [darwin]

  build:
    desc: build the go binary
    sources:
      - "**/*.go"
      - "./internal/web/static/**/*"
      - "**/*.templ"
      # TODO: uncomment this when we figure how to wait for the entire "templ generate" process
      # - exclude: "**/*_templ.go"
      - exclude: "./dist/**/*"
    generates:
      - "**/*_templ.go"
      - ./dist/main
    cmds:
      - templ generate -lazy .
      - ./tailwindcss --input {{.TAILWIND_INPUT_CSS_PATH}} --output {{.TAILWIND_OUTPUT_CSS_PATH}} --minify
      - go mod tidy
      - go build -o ./dist/main {{.SERVER_PATH}}/main.go

  tailwind:
    desc: Tailwind watch css changes in .templ files
    cmds:
      - ./tailwindcss --input {{.TAILWIND_INPUT_CSS_PATH}} --output {{.TAILWIND_OUTPUT_CSS_PATH}} --watch

  templ:
    desc: Templ hot reload, watches all .go files
    cmds:
      - templ generate --watch --proxy="http://localhost:{{.PORT}}" --open-browser=false --cmd="go run -tags=debug {{.SERVER_PATH}}"

  dev:
    method: none
    desc: watch for changes and start the project for development
    cmds:
      - task --parallel tailwind templ

  prod:
    method: none
    desc: build and start the project for production
    cmds:
      - task: build
      - ./dist/main

  default:
    - task: dev
